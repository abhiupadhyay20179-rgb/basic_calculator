 <html>
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>calculator</title>
 <script>
  let op = ' ';
  let dflag = 0;
  let num = 0;

  function inp(n) {
    if (document.getElementById("lbl").innerHTML == 0) {
      document.getElementById("lbl").innerHTML = "";
    }
    if ((document.getElementById("lbl").innerHTML).length < 15) {
      document.getElementById("lbl").innerHTML = document.getElementById("lbl").innerHTML + n;
    }
  }

  function equal() {
    dflag = 0;
    let result = 0;
    let currentValue = parseFloat(document.getElementById("lbl").innerHTML);

    if (op == '+') {
      result = num + currentValue;
      document.getElementById("lbl").innerHTML = result;
    }
    if (op == '-') {
      result = num - currentValue;
      document.getElementById("lbl").innerHTML = result;
    }
    if (op == 'x') {
      result = num * currentValue;
      document.getElementById("lbl").innerHTML = result;
    }
    if (op == '/') {
      if (currentValue === 0) {
        document.getElementById("lbl").innerHTML = "Error: Div/0";
        num = 0;
        return;
      }
      result = num / currentValue;
      document.getElementById("lbl").innerHTML = result;
    }
    num = 0;
  }

  function plus() {
    dflag = 0;
    num = parseFloat(document.getElementById("lbl").innerHTML);
    document.getElementById("lbl").innerHTML = "";
    op = '+';
  }

  function minus() {
    dflag = 0;
    num = parseFloat(document.getElementById("lbl").innerHTML);
    document.getElementById("lbl").innerHTML = "";
    op = '-';
  }

  function multi() {
    dflag = 0;
    num = parseFloat(document.getElementById("lbl").innerHTML);
    document.getElementById("lbl").innerHTML = "";
    op = 'x';
  }

  function point() {
    if (dflag == 0) {
      document.getElementById("lbl").innerHTML = document.getElementById("lbl").innerHTML + ".";
      dflag = 1;
    }
  }

  function divide() {
    dflag = 0;
    num = parseFloat(document.getElementById("lbl").innerHTML);
    document.getElementById("lbl").innerHTML = "";
    op = '/';
  }

  function clean() {
    dflag = 0;
    document.getElementById("lbl").innerHTML = "0";
  }

  function backf() {
    let p = document.getElementById("lbl").innerHTML;
    let c = p.length - 1;
    if (p.charAt(c) == ".") {
      dflag = 0;
    } else {
      dflag = 1;
    }
    p = p.substring(0, p.length - 1);
    document.getElementById("lbl").innerHTML = p;
  }
 </script>
 <style>
 * {
   margin: 0;
   padding: 0;
   box-sizing: border-box;
 }

 body {
   background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
   min-height: 100vh;
   display: flex;
   justify-content: center;
   align-items: center;
   font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 }

 .calculator-container {
   background: rgba(255, 255, 255, 0.05);
   width: 350px;
   padding: 25px;
   border-radius: 20px;
   box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
   backdrop-filter: blur(15px);
   border: 1px solid rgba(255, 255, 255, 0.1);
 }

 .display {
   background: rgba(0, 0, 0, 0.2);
   font-size: 2.5rem;
   font-weight: 300;
   display: flex;
   align-items: center;
   justify-content: flex-end;
   text-align: right;
   padding: 15px 20px;
   color: #fff;
   margin-bottom: 20px;
   border-radius: 12px;
   word-wrap: break-word;
   word-break: break-all;
   min-height: 80px;
   border: 1px solid rgba(255, 255, 255, 0.05);
   box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
 }

 .button-grid {
   display: grid;
   grid-template-columns: repeat(4, 1fr);
   gap: 12px;
 }

 .btn {
   height: 60px;
   font-size: 1.5rem;
   font-weight: 500;
   background: rgba(255, 255, 255, 0.05);
   color: white;
   border: 1px solid rgba(255, 255, 255, 0.1);
   border-radius: 12px;
   cursor: pointer;
   transition: all 0.2s ease;
   display: flex;
   justify-content: center;
   align-items: center;
   box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
   font-family: 'Segoe UI', sans-serif;
 }

 .btn:hover {
   transform: translateY(-2px);
   background: rgba(255, 255, 255, 0.1);
   box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
 }

 .btn:active {
   transform: translateY(0);
   box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
 }

 .btn.operator {
   background: rgba(102, 126, 234, 0.2);
   color: #a3bffa;
   border-color: rgba(102, 126, 234, 0.3);
 }

 .btn.operator:hover {
   background: rgba(102, 126, 234, 0.3);
 }

 .btn.action {
   background: rgba(245, 87, 108, 0.2);
   color: #ffb3c1;
   border-color: rgba(245, 87, 108, 0.3);
 }
 
 .btn.action:hover {
   background: rgba(245, 87, 108, 0.3);
 }

 .btn.span-2 {
   grid-column: span 2;
 }
 </style>
 </head>
 <body>
 <div class="calculator-container">
   <div class="display" id="lbl">0</div>
   <div class="button-grid">
     <button onclick="clean()" class="btn action span-2">CLEAR</button>
     <button onclick="backf()" class="btn action span-2">BACKSPACE</button>
     
     <button onclick="inp(7)" class="btn">7</button>
     <button onclick="inp(8)" class="btn">8</button>
     <button onclick="inp(9)" class="btn">9</button>
     <button onclick="plus()" class="btn operator">+</button>
     
     <button onclick="inp(4)" class="btn">4</button>
     <button onclick="inp(5)" class="btn">5</button>
     <button onclick="inp(6)" class="btn">6</button>
     <button onclick="minus()" class="btn operator">-</button>
     
     <button onclick="inp(1)" class="btn">1</button>
     <button onclick="inp(2)" class="btn">2</button>
     <button onclick="inp(3)" class="btn">3</button>
     <button onclick="multi()" class="btn operator">x</button>
     
     <button onclick="inp(0)" class="btn span-2">0</button>
     <button onclick="point()" class="btn">.</button>
     <button onclick="equal()" class="btn operator">=</button>
     <button onclick="divide()" class="btn operator">/</button>
   </div>
 </div>
 </body>
 </html>
